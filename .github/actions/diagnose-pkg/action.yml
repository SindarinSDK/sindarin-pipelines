name: Diagnose Package Failure
description: Re-compile failing Sindarin test files with verbose output to surface compile errors.

runs:
  using: composite
  steps:
    - name: Diagnose compile errors
      shell: bash
      run: |
        echo "=== Compiler version ==="
        sn --version
        echo ""
        echo "=== Attempting failing tests with verbose output ==="
        for f in tests/test_*.sn; do
          echo ""
          echo "--- Compiling: $f ---"
          sn "$f" -o /tmp/diag_test -v -l 2 2>&1 || true
        done
