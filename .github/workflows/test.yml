# Reusable CI workflow for Sindarin packages
# Installs the compiler from latest release, installs deps, runs make test.
#
# Usage (in calling repo's .github/workflows/ci.yml):
#   jobs:
#     test:
#       uses: SindarinSDK/sindarin-pipelines/.github/workflows/test.yml@main

name: Package Test

on:
  workflow_call:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #------------------------------------------------------------------------
      # Platform prerequisites
      #------------------------------------------------------------------------
      - name: Setup Prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Remove system LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files\LLVM") {
            Write-Host "Removing system LLVM to avoid conflicts..."
            Remove-Item -Path "C:\Program Files\LLVM" -Recurse -Force
          }

      - name: Install LLVM-MinGW (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "20241217"
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$version/llvm-mingw-$version-ucrt-x86_64.zip"
          $zipPath = "$env:TEMP\llvm-mingw.zip"
          $extractPath = "C:\llvm-mingw"

          Write-Host "Downloading LLVM-MinGW $version..."
          Invoke-WebRequest -Uri $url -OutFile $zipPath

          Write-Host "Extracting to $extractPath..."
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          $llvmDir = Get-ChildItem -Path $extractPath -Directory | Select-Object -First 1
          $binPath = Join-Path $llvmDir.FullName "bin"

          Write-Host "LLVM-MinGW installed at: $($llvmDir.FullName)"
          echo "$binPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Make (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install make -y

      #------------------------------------------------------------------------
      # Install Sindarin compiler from latest release
      #------------------------------------------------------------------------
      - name: Install Sindarin (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INSTALL_DIR="$HOME/.sn"
          rm -rf "$INSTALL_DIR"
          mkdir -p "$INSTALL_DIR"

          # Detect platform
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64|amd64) ARCH="x64" ;;
            aarch64|arm64) ARCH="arm64" ;;
          esac

          # Download and extract latest release
          PATTERN="sindarin-*-${OS}-${ARCH}.tar.gz"
          echo "Downloading latest release matching: $PATTERN"
          gh release download --repo SindarinSDK/sindarin-compiler --pattern "$PATTERN" --dir /tmp
          TARBALL=$(ls /tmp/sindarin-*-${OS}-${ARCH}.tar.gz)
          tar -xzf "$TARBALL" -C "$INSTALL_DIR"

          # Flatten nested directory
          NESTED=$(find "$INSTALL_DIR" -mindepth 1 -maxdepth 1 -type d)
          if [ -d "$NESTED/bin" ]; then
            mv "$NESTED"/* "$INSTALL_DIR/"
            rmdir "$NESTED"
          fi

          chmod +x "$INSTALL_DIR/bin/sn"
          echo "$INSTALL_DIR/bin" >> "$GITHUB_PATH"
          echo "Installed: $($INSTALL_DIR/bin/sn --version)"

      - name: Install Sindarin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $InstallDir = Join-Path $env:USERPROFILE ".sn"
          if (Test-Path $InstallDir) { Remove-Item -Path $InstallDir -Recurse -Force }
          New-Item -ItemType Directory -Path $InstallDir -Force | Out-Null

          # Download latest Windows release
          $tempDir = Join-Path $env:TEMP "sn-install"
          New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
          gh release download --repo SindarinSDK/sindarin-compiler --pattern "sindarin-*-windows-x64.zip" --dir $tempDir

          $zipFile = Get-ChildItem -Path $tempDir -Filter "sindarin-*-windows-x64.zip" | Select-Object -First 1
          Write-Host "Extracting $($zipFile.Name)..."
          Expand-Archive -Path $zipFile.FullName -DestinationPath $InstallDir -Force

          # Flatten nested directory
          $nested = Get-ChildItem -Path $InstallDir -Directory
          if ($nested.Count -eq 1 -and (Test-Path (Join-Path $nested[0].FullName "bin"))) {
            Get-ChildItem -Path $nested[0].FullName | Move-Item -Destination $InstallDir -Force
            Remove-Item -Path $nested[0].FullName -Force
          }

          $binDir = Join-Path $InstallDir "bin"
          echo $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Installed: $(& (Join-Path $binDir 'sn.exe') --version)"
          Remove-Item -Path $tempDir -Recurse -Force

      - name: Verify compiler
        shell: bash
        run: sn --version

      #------------------------------------------------------------------------
      # Install dependencies and test
      #------------------------------------------------------------------------
      - name: Install dependencies
        shell: bash
        run: sn --install

      - name: Run tests
        shell: bash
        run: make test
