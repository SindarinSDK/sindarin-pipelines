# Reusable CI workflow for Sindarin packages
# Installs the compiler from latest release, installs deps, runs make test.
#
# Usage (in calling repo's .github/workflows/ci.yml):
#   jobs:
#     test:
#       uses: SindarinSDK/sindarin-pipelines/.github/workflows/sindarin-pkg-test.yml@main

name: Sindarin Package Test

on:
  workflow_call:

jobs:
  sindarin-pkg-test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Prerequisites
        uses: SindarinSDK/sindarin-pipelines/.github/actions/setup-prereqs@main

      - name: Install Sindarin
        uses: SindarinSDK/sindarin-pipelines/.github/actions/install-sindarin@main
        with:
          github-token: ${{ github.token }}

      - name: Install dependencies
        uses: SindarinSDK/sindarin-pipelines/.github/actions/install-deps@main
        with:
          github-token: ${{ github.token }}

      - name: Run tests
        shell: bash
        run: make test

      - name: Diagnose compile errors
        if: failure()
        uses: SindarinSDK/sindarin-pipelines/.github/actions/diagnose-pkg@main
