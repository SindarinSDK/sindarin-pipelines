# Reusable CI workflow for Sindarin packages
# Installs the compiler from latest release, installs deps, runs make test.
#
# Usage (in calling repo's .github/workflows/ci.yml):
#   jobs:
#     test:
#       uses: SindarinSDK/sindarin-pipelines/.github/workflows/sindarin-pkg-test.yml@main
#
# To restrict platforms, pass a JSON array via `platforms`:
#   jobs:
#     test:
#       uses: SindarinSDK/sindarin-pipelines/.github/workflows/sindarin-pkg-test.yml@main
#       with:
#         platforms: '["ubuntu-latest"]'

name: Sindarin Package Test

on:
  workflow_call:
    inputs:
      platforms:
        description: 'JSON-encoded array of runner OSes to test on.'
        type: string
        required: false
        default: '["ubuntu-latest","windows-latest","macos-latest"]'

jobs:
  sindarin-pkg-test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.platforms) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Sindarin
        uses: SindarinSDK/sindarin-pipelines/.github/actions/install-sindarin@main

      - name: Check formatting
        shell: bash
        run: sn --format --check

      - name: Run tests
        shell: bash
        run: make test
